<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script defer src="script.js?v=2"></script>
</head>
<body class="body">
    <div class="container">
        <div class="controls">
            <button class="toggle-theme" type="button" aria-label="Toggle dark mode">🌙</button>
            <button class="peek-button" type="button" aria-label="Peek at all cards">🤫</button>
        </div>
        <h2>Memory Game</h2>
        <div class="game"></div>
        <button class="reset" type="button">Reset Game</button>
    </div>
</body>
</html>
